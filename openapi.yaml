openapi: 3.1.0
info:
  title: GetLicense API
  version: 1.0.0
  description: >
    GetLicense is an open-source software licensing platform.
    It provides a REST API for managing products, licenses, machines,
    API keys, and webhooks with multi-tenant isolation and environment separation.
  contact:
    url: https://getlicense.io
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local development server

security:
  - BearerAuth: []

tags:
  - name: auth
    description: Authentication and account management
  - name: products
    description: Product CRUD operations
  - name: licenses
    description: License lifecycle and machine management
  - name: validation
    description: Public license validation
  - name: api-keys
    description: API key management
  - name: webhooks
    description: Webhook endpoint management
  - name: events
    description: Domain event audit log
  - name: metrics
    description: Analytics metrics snapshot
  - name: search
    description: Global cross-resource search

paths:
  # ── Auth ────────────────────────────────────────────────────────────────
  /v1/auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new account
      description: Creates a new account, owner user, and an initial live API key.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResult"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate a user
      description: Authenticates a user by email and password, returning JWT access and refresh tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      description: Exchanges a valid refresh token for a new access/refresh token pair.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Invalidate refresh token
      description: Invalidates the provided refresh token so it can no longer be used.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: Logged out
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user and account
      description: Returns the authenticated user and their account. Requires JWT authentication (not API key).
      responses:
        "200":
          description: Current user and account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Products ────────────────────────────────────────────────────────────
  /v1/products:
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      description: Creates a new product with an auto-generated Ed25519 keypair for license signing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      description: Returns a paginated list of products for the authenticated account.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated list of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      description: Retrieves a single product by ID.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      description: Applies partial updates to an existing product.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      description: Permanently removes a product by ID.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Product deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Licenses (under product) ────────────────────────────────────────────
  /v1/products/{id}/licenses:
    get:
      operationId: listLicensesByProduct
      tags: [licenses]
      summary: List licenses for a product
      description: Returns a cursor-paginated list of licenses scoped to the specified product.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated list of licenses for this product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createLicense
      tags: [licenses]
      summary: Create a license
      description: Creates a new license under the specified product.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLicenseRequest"
      responses:
        "201":
          description: License created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: bulkRevokeLicensesByProduct
      tags: [licenses]
      summary: Bulk-revoke licenses for a product
      description: >
        Revokes every active or suspended license under the specified
        product. Collection-level DELETE — no request body — mirrors
        the soft-delete semantic of DELETE /v1/licenses/:id, where
        "delete" means "revoke". Used by the dashboard to unblock a
        product delete when individual revokes would be too slow.
        Returns the number of rows transitioned.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Bulk revoke result
          content:
            application/json:
              schema:
                type: object
                required: [revoked]
                properties:
                  revoked:
                    type: integer
                    description: Number of licenses transitioned to revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/products/{id}/licenses/bulk:
    post:
      operationId: bulkCreateLicenses
      tags: [licenses]
      summary: Bulk-create licenses
      description: Creates up to 100 licenses under the specified product in a single transaction.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateLicenseRequest"
      responses:
        "201":
          description: Licenses created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateLicenseResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Licenses (standalone) ──────────────────────────────────────────────
  /v1/licenses:
    get:
      operationId: listLicenses
      tags: [licenses]
      summary: List licenses
      description: Returns a paginated list of licenses for the authenticated account.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated list of licenses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/licenses/{id}:
    get:
      operationId: getLicense
      tags: [licenses]
      summary: Get a license
      description: Retrieves a single license by ID.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: License details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: updateLicense
      tags: [licenses]
      summary: Partial update of a license
      description: |
        Updates license.overrides or license.expires_at. Both are optional;
        omitted fields are unchanged. Sending overrides replaces the whole
        overrides struct. Sending expires_at=null clears it (makes the
        license perpetual).
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLicenseRequest"
      responses:
        "200":
          description: Updated license
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      operationId: revokeLicense
      tags: [licenses]
      summary: Revoke a license
      description: Permanently revokes a license. Only active or suspended licenses can be revoked.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: License revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/licenses/{id}/suspend:
    post:
      operationId: suspendLicense
      tags: [licenses]
      summary: Suspend a license
      description: Temporarily suspends an active license.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: License suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/licenses/{id}/reinstate:
    post:
      operationId: reinstateLicense
      tags: [licenses]
      summary: Reinstate a license
      description: Reactivates a suspended license back to active status.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: License reinstated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/licenses/{id}/activate:
    post:
      operationId: activateMachine
      tags: [licenses]
      summary: Activate a machine (or resurrect a dead one)
      description: |
        Issues a signed gl2 lease token for a machine activation. If the
        fingerprint already has a row (active, stale, or dead), the existing
        row is reused (idempotent or resurrection). Dead machines transition
        back to active; the row ID is preserved for audit continuity.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateRequest"
      responses:
        "201":
          description: Machine activated — includes signed lease token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateResult"
        "400":
          description: Invalid fingerprint format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: License suspended/revoked/expired or max machines reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/licenses/{id}/deactivate:
    post:
      operationId: deactivateMachine
      tags: [licenses]
      summary: Deactivate a machine
      description: Removes a machine by fingerprint from a license.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeactivateRequest"
      responses:
        "204":
          description: Machine deactivated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/licenses/{id}/freeze:
    post:
      operationId: freezeLicense
      tags: [licenses]
      summary: Snapshot effective values into license overrides
      description: |
        Computes the current effective (policy ∪ overrides) values and
        writes every quantitative field into license.overrides. After
        freezing, the license is immune to future policy changes until
        those overrides are cleared.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: License frozen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/licenses/{id}/attach-policy:
    post:
      operationId: attachLicensePolicy
      tags: [licenses]
      summary: Move license to a different policy
      description: |
        Moves the license to a new policy. The new policy must belong
        to the same product as the license. Optionally clears any
        existing overrides in the same transaction.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachPolicyRequest"
      responses:
        "200":
          description: Policy attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Policy belongs to a different product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Policies (L1) ───────────────────────────────────────────────────────
  /v1/products/{id}/policies:
    get:
      operationId: listProductPolicies
      tags: [policies]
      summary: List policies for a product
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of policies
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Policy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createProductPolicy
      tags: [policies]
      summary: Create a policy for a product
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyRequest"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/policies/{id}:
    get:
      operationId: getPolicy
      tags: [policies]
      summary: Get a single policy
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updatePolicy
      tags: [policies]
      summary: Update a policy
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyRequest"
      responses:
        "200":
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deletePolicy
      tags: [policies]
      summary: Delete a policy
      description: |
        Refuses the default policy with 422 policy_is_default — promote
        another first. Without ?force=true, refuses any policy referenced
        by licenses with 422 policy_in_use. With ?force=true, reassigns
        referencing licenses to the product's default before deleting.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - in: query
          name: force
          schema:
            type: boolean
          description: Reassigns referencing licenses to the product default before deletion.
      responses:
        "204":
          description: Policy deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Policy is default or in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/policies/{id}/set-default:
    post:
      operationId: setDefaultPolicy
      tags: [policies]
      summary: Promote a policy to be its product's default
      description: |
        Clears is_default on the previous default and sets it on the
        target policy inside one transaction. The partial unique index
        on (product_id) WHERE is_default=true enforces the invariant.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Default promoted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Policy does not belong to a product in this account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/licenses/{id}/machines/{fingerprint}/checkin:
    post:
      operationId: checkinMachine
      tags: [licenses]
      summary: Renew a machine's lease
      description: |
        Renews the lease on an existing machine. Returns a fresh signed
        gl2 lease token. Rejects with 409 machine_dead if the machine has
        transitioned to dead — caller must re-activate to resurrect.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - in: path
          name: fingerprint
          required: true
          schema: { type: string }
          description: URL-encoded machine fingerprint
      responses:
        "200":
          description: Lease renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Machine is dead — re-activate to resurrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: License suspended, revoked, or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Entitlements (L3) ────────────────────────────────────────────────────
  /v1/entitlements:
    get:
      operationId: listEntitlements
      tags: [entitlements]
      summary: List entitlements
      parameters:
        - in: query
          name: code_prefix
          schema: { type: string }
          description: Case-insensitive prefix match on entitlement.code.
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of entitlements
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Entitlement"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createEntitlement
      tags: [entitlements]
      summary: Create an entitlement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntitlementRequest"
      responses:
        "201":
          description: Entitlement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Duplicate code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/entitlements/{id}:
    get:
      operationId: getEntitlement
      tags: [entitlements]
      summary: Get an entitlement by ID
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Entitlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateEntitlement
      tags: [entitlements]
      summary: Update entitlement name or metadata (code is immutable)
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntitlementRequest"
      responses:
        "200":
          description: Updated entitlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Attempted to change code (immutable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteEntitlement
      tags: [entitlements]
      summary: Delete an entitlement
      description: |
        Blocked with 409 entitlement_in_use if any policy or license
        references it (ON DELETE RESTRICT FK). Detach first.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Entitlement in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/policies/{id}/entitlements:
    get:
      operationId: listPolicyEntitlements
      tags: [entitlements, policies]
      summary: List entitlement codes attached to a policy
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Array of entitlement codes
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: attachPolicyEntitlements
      tags: [entitlements, policies]
      summary: Idempotent attach of entitlement codes to a policy
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntitlementCodesRequest"
      responses:
        "200":
          description: Attached
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
    put:
      operationId: replacePolicyEntitlements
      tags: [entitlements, policies]
      summary: Replace the entire entitlement set for a policy
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntitlementCodesRequest"
      responses:
        "200":
          description: Replaced
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/policies/{id}/entitlements/{code}:
    delete:
      operationId: detachPolicyEntitlement
      tags: [entitlements, policies]
      summary: Detach a single entitlement from a policy
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Detached
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/licenses/{id}/entitlements:
    get:
      operationId: listLicenseEntitlements
      tags: [entitlements, licenses]
      summary: Three-set entitlement response for a license
      description: |
        Returns policy-sourced, license-sourced, and effective (union)
        entitlement codes. Effective is always the sorted union.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Entitlement sets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitlementSets"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: attachLicenseEntitlements
      tags: [entitlements, licenses]
      summary: Idempotent attach of entitlement codes to a license
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntitlementCodesRequest"
      responses:
        "200":
          description: Attached
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
    put:
      operationId: replaceLicenseEntitlements
      tags: [entitlements, licenses]
      summary: Replace the entire license-level entitlement set
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntitlementCodesRequest"
      responses:
        "200":
          description: Replaced
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/licenses/{id}/entitlements/{code}:
    delete:
      operationId: detachLicenseEntitlement
      tags: [entitlements, licenses]
      summary: Detach a single entitlement from a license
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Detached
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Customers (L4) ──────────────────────────────────────────────────────
  /v1/customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      description: |
        Account-scoped list. Filters by email prefix (case-insensitive) and
        optionally by created_by_account_id. Cursor-paginated.
      parameters:
        - in: query
          name: email
          schema: { type: string }
          description: Case-insensitive prefix match on customer.email.
        - in: query
          name: created_by_account_id
          schema: { type: string, format: uuid }
          description: Filter by attribution (grant-created customers).
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of customers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer name or metadata
      description: Email is immutable — create a new customer to change the email.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerRequest"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      description: |
        Refuses with 409 `customer_in_use` when any license still references
        the customer (regardless of license status — revoked licenses still
        pin the customer). Reassign or delete licenses first.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Customer deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Customer has licenses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/customers/{id}/licenses:
    get:
      operationId: listCustomerLicenses
      tags: [customers]
      summary: List licenses owned by a customer
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of licenses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/License"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/grants/{grant_id}/customers:
    get:
      operationId: listGrantCustomers
      tags: [customers, grants]
      summary: List customers the grantee created under this grant
      description: |
        Returns only customers where `created_by_account_id` equals the
        acting (grantee) account AND `account_id` equals the grantor
        (enforced by grant routing middleware). Vendors use the direct
        `GET /v1/customers` endpoint to see all customers including
        grant-created ones. A grantee hitting `GET /v1/customers/:id`
        directly for a customer they did not create returns 404 — no
        existence leak. Requires `CUSTOMER_READ` capability on the grant.
      parameters:
        - name: grant_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of customers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Grant lacks CUSTOMER_READ capability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Validate ────────────────────────────────────────────────────────────
  /v1/validate:
    post:
      operationId: validateLicense
      tags: [validation]
      summary: Validate a license key
      description: >
        Checks a license key and returns its validity and details.
        This is a public endpoint — no authentication required.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateRequest"
      responses:
        "200":
          description: License is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateResult"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── API Keys ────────────────────────────────────────────────────────────
  /v1/api-keys:
    post:
      operationId: createAPIKey
      tags: [api-keys]
      summary: Create an API key
      description: Creates a new API key for the authenticated account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listAPIKeys
      tags: [api-keys]
      summary: List API keys
      description: Returns a paginated list of API keys for the authenticated account.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated list of API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/api-keys/{id}:
    delete:
      operationId: deleteAPIKey
      tags: [api-keys]
      summary: Delete an API key
      description: Permanently removes an API key by ID.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: API key deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Webhooks ────────────────────────────────────────────────────────────
  /v1/webhooks:
    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Register a webhook endpoint
      description: Registers a new webhook endpoint to receive event notifications.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Webhook endpoint created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: listWebhooks
      tags: [webhooks]
      summary: List webhook endpoints
      description: Returns a paginated list of webhook endpoints for the authenticated account.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated list of webhook endpoints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpointList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/webhooks/{id}:
    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Delete a webhook endpoint
      description: Permanently removes a webhook endpoint by ID.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Webhook endpoint deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/webhooks/{id}/deliveries:
    get:
      operationId: listWebhookDeliveries
      tags: [webhooks]
      summary: List webhook deliveries
      description: >
        Returns a cursor-paginated list of delivery attempts for a webhook endpoint.
        Optionally filter by event_type or status.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: event_type
          in: query
          schema:
            $ref: "#/components/schemas/EventType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/DeliveryStatus"
      responses:
        "200":
          description: Paginated list of webhook deliveries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeliveryList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/webhooks/{id}/deliveries/{delivery_id}:
    get:
      operationId: getWebhookDelivery
      tags: [webhooks]
      summary: Get webhook delivery detail
      description: Returns a single webhook delivery by ID.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - name: delivery_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook delivery detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/webhooks/{id}/deliveries/{delivery_id}/redeliver:
    post:
      operationId: redeliverWebhook
      tags: [webhooks]
      summary: Redeliver a webhook
      description: >
        Re-dispatches the domain event linked to a delivery. Creates a new
        delivery row with a single synchronous attempt. Returns 422 if the
        original delivery predates the domain event log.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - name: delivery_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: New delivery created and dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Auth (TOTP two-step + account switching) ───────────────────────────
  /v1/auth/login/totp:
    post:
      operationId: loginStep2TOTP
      tags: [auth]
      summary: Complete TOTP login (step 2)
      description: >
        Exchange a short-lived pending token from POST /v1/auth/login
        (when the identity has TOTP enabled) and a 6-digit TOTP code
        for a full token pair. A single-use recovery code may be
        submitted in place of the TOTP code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginTOTPRequest"
      responses:
        "200":
          description: Authenticated — full token pair returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/auth/switch:
    post:
      operationId: switchAccount
      tags: [auth]
      summary: Switch the acting account
      description: >
        Change the acting account for a multi-account identity. Returns
        a new access token scoped to the selected membership. The
        identity must already be an active member of the target account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchAccountRequest"
      responses:
        "200":
          description: Acting account switched — new token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Identity / TOTP enrollment ─────────────────────────────────────────
  /v1/identity/totp/enroll:
    post:
      operationId: enrollTOTP
      tags: [identity]
      summary: Begin TOTP enrollment
      description: >
        Generates a fresh TOTP secret and provisioning URL for the
        authenticated identity. The identity is not yet activated —
        the caller must prove knowledge of a valid code via
        /v1/identity/totp/activate.
      responses:
        "200":
          description: TOTP secret + otpauth URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TOTPEnrollResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: TOTP already enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/identity/totp/activate:
    post:
      operationId: activateTOTP
      tags: [identity]
      summary: Activate TOTP
      description: >
        Verifies a code against the enrolled secret and, on success,
        enables TOTP and returns 10 single-use recovery codes. The
        codes are shown exactly once — store them carefully. If the
        authenticator is lost, any recovery code can complete
        /v1/auth/login/totp or /v1/identity/totp/disable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TOTPCodeRequest"
      responses:
        "200":
          description: TOTP activated, recovery codes returned once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TOTPActivateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: TOTP already enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/identity/totp/disable:
    post:
      operationId: disableTOTP
      tags: [identity]
      summary: Disable TOTP
      description: >
        Clears TOTP state after verifying a current code (TOTP or a
        single-use recovery code). Either proof is sufficient so a
        user who has lost their authenticator can still turn TOTP off.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TOTPCodeRequest"
      responses:
        "204":
          description: TOTP disabled
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Environments ───────────────────────────────────────────────────────
  /v1/environments:
    get:
      operationId: listEnvironments
      tags: [environments]
      summary: List environments
      description: >
        Returns every environment for the authenticated account.
        Capped at 5 per account, so has_more is always false and
        next_cursor is always null — the response uses the common
        Page shape for client consistency.
      responses:
        "200":
          description: List of environments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createEnvironment
      tags: [environments]
      summary: Create an environment
      description: >
        Creates a custom environment slug for the account. Each
        account is capped at 5 environments total (live + test + up
        to 3 custom). Returns 422 environment_limit_reached on the
        sixth create.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnvironmentRequest"
      responses:
        "201":
          description: Environment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentResource"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/environments/{id}:
    delete:
      operationId: deleteEnvironment
      tags: [environments]
      summary: Delete an environment
      description: >
        Removes an environment from the account. Refuses when the
        environment holds active or suspended licenses
        (environment_not_empty) or when it is the last remaining
        environment in the account (last_environment).
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Environment deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Invitations ────────────────────────────────────────────────────────
  /v1/invitations/{token}/lookup:
    get:
      operationId: lookupInvitation
      tags: [invitations]
      summary: Preview an invitation by token
      description: >
        Unauthenticated endpoint that returns recipient-safe metadata
        for an invitation (kind, email, account name, role name,
        expiry). The token in the URL is the credential. Used by the
        landing page that renders before the recipient signs up.
      security: []
      parameters:
        - name: token
          in: path
          required: true
          description: Raw invitation token
          schema: { type: string }
      responses:
        "200":
          description: Invitation preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationLookup"
        "404":
          description: Invitation not found, expired, or already accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/invitations/{token}/accept:
    post:
      operationId: acceptInvitation
      tags: [invitations]
      summary: Accept an invitation
      description: >
        Authenticated endpoint. The caller's identity email MUST
        match the invitation email (case-insensitive) — an
        invitation cannot be accepted on someone else's behalf.
        For kind=membership, creates an AccountMembership in the
        target account. For kind=grant, issues and auto-activates
        a Grant with the draft's capabilities and constraints.
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationAcceptResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invitation already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Invitation expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/accounts/{account_id}/invitations:
    post:
      operationId: createInvitation
      tags: [invitations]
      summary: Create a membership or grant invitation
      description: >
        Issues a new invitation in the specified account. The
        authenticated identity must have the invitation:create
        permission in the target account. The request body shape
        selects the kind — include role_slug for membership
        invitations or grant_draft for grant invitations.
      parameters:
        - name: account_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInvitationResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Grants ─────────────────────────────────────────────────────────────
  /v1/accounts/{account_id}/grants:
    post:
      operationId: issueGrant
      tags: [grants]
      summary: Issue a capability grant
      description: >
        Creates a pending grant delegating a specified slice of
        licensing capability from the grantor account (the URL
        account) to the grantee account. The grantee must call
        POST /v1/grants/{grant_id}/accept to activate it.
      parameters:
        - name: account_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueGrantRequest"
      responses:
        "201":
          description: Grant issued (pending)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/accounts/{account_id}/grants/{grant_id}/revoke:
    post:
      operationId: revokeGrant
      tags: [grants]
      summary: Revoke a grant
      description: Terminal transition. A revoked grant cannot be reinstated.
      parameters:
        - name: account_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: grant_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Grant revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/accounts/{account_id}/grants/{grant_id}/suspend:
    post:
      operationId: suspendGrant
      tags: [grants]
      summary: Suspend an active grant
      description: Temporarily disables a grant. The grantor may re-activate via accept.
      parameters:
        - name: account_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: grant_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Grant suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/grants/{grant_id}/accept:
    post:
      operationId: acceptGrant
      tags: [grants]
      summary: Accept a pending grant (grantee)
      description: >
        The grantee calls this to transition a pending grant to
        active. The caller must be authenticated as a member of the
        grantee account.
      parameters:
        - name: grant_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Grant accepted (active)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/grants/{grant_id}/licenses:
    post:
      operationId: createLicenseUnderGrant
      tags: [grants, licenses]
      summary: Create a license under a grant (grantee scope)
      description: >
        The grantee exercises the license.create capability of an
        active grant. The license lands in the grantor's tenant
        (license.account_id = grantor) but carries the grantee's
        attribution (license.created_by_account_id = grantee and
        license.grant_id = the grant). Enforces the grant's
        constraints (max_licenses_total, max_licenses_per_month,
        allowed_policy_ids, customer_email_pattern, ...) plus the grant's
        capabilities (CUSTOMER_CREATE for inline customer, CUSTOMER_READ
        for attach-by-id).
      parameters:
        - name: grant_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLicenseRequest"
      responses:
        "201":
          description: License created under the grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Events ──────────────────────────────────────────────────────────────
  /v1/events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List domain events
      description: >
        Cursor-paginated audit log of domain events with optional filters.
        Events are recorded synchronously during mutations and delivered
        asynchronously to webhook endpoints via a background poller.
      parameters:
        - in: query
          name: resource_type
          schema:
            type: string
        - in: query
          name: resource_id
          schema:
            type: string
        - in: query
          name: event_type
          schema:
            type: string
        - in: query
          name: identity_id
          schema:
            type: string
            format: uuid
        - in: query
          name: grant_id
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of domain events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DomainEvent"
                  has_more:
                    type: boolean
                  next_cursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single domain event
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Domain event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Metrics ─────────────────────────────────────────────────────────────
  /v1/metrics:
    get:
      operationId: getMetrics
      tags: [metrics]
      summary: Get metrics snapshot
      description: >
        Returns KPI counts (licenses, machines, customers, grants) and
        daily event buckets for the authenticated account and environment.
      parameters:
        - name: from
          in: query
          description: "Start of date range (RFC 3339). Default: 30 days ago."
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: "End of date range (RFC 3339). Default: now."
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Search ─────────────────────────────────────────────────────────────
  /v1/search:
    get:
      operationId: globalSearch
      tags: [search]
      summary: Global search across resource types
      description: >
        Searches licenses, machines, customers, and products using a simple
        DSL. Supports field:value filters and bare word prefix matching.
        Results are RLS-scoped to the authenticated tenant. Limit 10 per type.
      parameters:
        - name: q
          in: query
          required: true
          description: >
            Search query using the DSL syntax. Examples:
            `type:license key:GETL`, `type:customer email:john@`,
            `john@example.com` (bare word searches all types).
          schema:
            type: string
        - name: types
          in: query
          description: >
            Comma-separated list of resource types to search.
            Valid values: license, machine, customer, product.
            If omitted, all types are searched.
          schema:
            type: string
      responses:
        "200":
          description: Search results grouped by type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Dual-mode authentication. Pass either a JWT access token (from login)
        or an API key (prefixed gl_live_ or gl_test_) as the Bearer token.

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      description: Resource UUID
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      required: false
      description: Page size (default 50, max 200)
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200

    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque cursor from a previous response's `next_cursor`. Omit for
        the first page. Treat as a black box — the encoding is not
        stable across API versions.
      schema:
        type: string

  responses:
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Authenticated but not authorized for this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ── Error ────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, doc_url]
          properties:
            code:
              type: string
              description: Machine-readable error code
              examples: ["validation_error"]
            message:
              type: string
              description: Human-readable error description
              examples: ["Invalid product ID"]
            doc_url:
              type: string
              format: uri
              description: Link to error documentation
              examples: ["https://getlicense.io/docs/errors/validation_error"]

    # ── Pagination ───────────────────────────────────────────────────────
    # List endpoints use opaque cursor pagination. Clients should treat
    # next_cursor as a black box — it encodes the (created_at, id) pair
    # of the last row on the current page. Pass it back as the `cursor`
    # query parameter to fetch the next page.
    Page:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          description: Page of items; shape depends on the endpoint
        has_more:
          type: boolean
          description: True if additional pages exist after this one
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null when has_more is false

    # ── Account ──────────────────────────────────────────────────────────
    Account:
      type: object
      required: [id, name, slug, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Identity ─────────────────────────────────────────────────────────
    # Global login identity. One identity can belong to many accounts via
    # AccountMembership. Replaces the legacy User schema.
    Identity:
      type: object
      required: [id, email, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        totp_enabled_at:
          type: string
          format: date-time
          nullable: true
          description: Set when TOTP two-factor is enabled, null otherwise.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── AccountSummary ────────────────────────────────────────────────────
    # Compact account view embedded inside membership and login responses.
    # Use the full Account schema when created_at is also needed.
    AccountSummary:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string

    # ── MembershipSummary ────────────────────────────────────────────────
    # An identity's membership in an account along with its role,
    # denormalized for use in login/signup/me responses.
    MembershipSummary:
      type: object
      required: [membership_id, account, role_slug, role_name]
      properties:
        membership_id:
          type: string
          format: uuid
        account:
          $ref: "#/components/schemas/AccountSummary"
        role_slug:
          type: string
          description: Role slug (e.g. owner, admin, developer, operator).
        role_name:
          type: string
          description: Human-readable role name.

    # ── Role ─────────────────────────────────────────────────────────────
    # Permission bundle. Account-scoped (account_id set) for custom roles
    # or global preset (account_id null) for owner/admin/developer/operator.
    Role:
      type: object
      required: [id, slug, name, permissions, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
          nullable: true
          description: Null for global preset roles.
        slug:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
          description: Flat permission strings like "license:create".
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Product ──────────────────────────────────────────────────────────
    Product:
      type: object
      required: [id, account_id, name, slug, public_key, created_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        public_key:
          type: string
          description: Base64-encoded Ed25519 public key for offline license verification
        metadata:
          type: object
          description: Arbitrary key-value metadata
        created_at:
          type: string
          format: date-time

    # ── Policy (L1) ──────────────────────────────────────────────────────
    Policy:
      type: object
      description: |
        License lifecycle configuration. Every license references exactly one
        policy. Effective values are resolved lazily so policy updates cascade
        to referencing licenses. Per-license overrides live on License.overrides.
      required:
        - id
        - account_id
        - product_id
        - name
        - is_default
        - expiration_strategy
        - expiration_basis
        - component_matching_strategy
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        name:
          type: string
        is_default:
          type: boolean
        duration_seconds:
          type: integer
          nullable: true
          description: Null means perpetual
        expiration_strategy:
          type: string
          enum: [MAINTAIN_ACCESS, RESTRICT_ACCESS, REVOKE_ACCESS]
          description: |
            MAINTAIN_ACCESS — validation stays valid past expires_at (informational).
            RESTRICT_ACCESS — validation returns expired; license status stays active.
            REVOKE_ACCESS — background job transitions license to expired (default).
        expiration_basis:
          type: string
          enum: [FROM_CREATION, FROM_FIRST_ACTIVATION]
        max_machines:
          type: integer
          nullable: true
          description: Null means unlimited
        max_seats:
          type: integer
          nullable: true
        floating:
          type: boolean
        strict:
          type: boolean
        require_checkout:
          type: boolean
          description: Reserved for L2 checkout mechanism
        checkout_interval_sec:
          type: integer
        max_checkout_duration_sec:
          type: integer
        checkout_grace_sec:
          type: integer
          description: |
            Seconds between lease expiry and dead transition. During this
            window the machine is 'stale' (still counts toward max_machines)
            and can be resurrected with a checkin. Default 86400 (1 day).
        component_matching_strategy:
          type: string
          enum: [MATCH_ANY, MATCH_TWO, MATCH_ALL]
          description: Reserved for L5 component matching
        metadata:
          type: object
        validation_ttl_sec:
          type: integer
          nullable: true
          minimum: 60
          maximum: 2592000
          description: |
            Runtime SDK staleness tolerance (seconds). Tells the SDK how long
            it may trust a cached gl1 token before re-checking the server.
            Null inherits the server default (GETLICENSE_DEFAULT_VALIDATION_TTL_SEC,
            default 3600). Cascades to licenses via the effective-value rule.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LicenseOverrides:
      type: object
      description: |
        Sparse per-license overrides for quantitative policy fields. Nil
        (omitted) fields mean "inherit from policy". Only quantitative
        fields are overridable — behavioral flags (Floating, Strict,
        ExpirationStrategy, RequireCheckout) are policy-only.
      properties:
        max_machines:
          type: integer
          nullable: true
        max_seats:
          type: integer
          nullable: true
        checkout_interval_sec:
          type: integer
          nullable: true
        max_checkout_duration_sec:
          type: integer
          nullable: true
        validation_ttl_sec:
          type: integer
          nullable: true
          minimum: 60
          maximum: 2592000
          description: |
            Per-license override of policy.validation_ttl_sec. Null inherits
            from policy. Same bounds as the policy field.

    LicenseTokenClaims:
      type: object
      description: |
        Claim set of the gl1 license token. The wire form is
        `gl1.<base64url(json)>.<base64url(ed25519sig)>`. The signature
        covers the base64url-encoded payload string, not the raw JSON.
        Clients must decode using the product's Ed25519 public key before
        trusting any field. This schema is documentation-only — the token
        is returned as a plain string on License.token and ValidateResult.license.token.
      required: [v, pid, lid, status, iat, ttl]
      properties:
        v:
          type: integer
          description: Payload version. Currently always 1.
        pid:
          type: string
          format: uuid
          description: Product ID.
        lid:
          type: string
          format: uuid
          description: License ID.
        status:
          type: string
          description: License status (active / suspended / revoked / expired / inactive).
        iat:
          type: integer
          description: Issued-at Unix timestamp (seconds).
        exp:
          type: integer
          nullable: true
          description: Expires-at Unix timestamp (seconds). Null = perpetual.
        ttl:
          type: integer
          description: |
            Validation staleness tolerance (seconds). SDK may trust a cached
            copy of this token for this many seconds before re-checking the
            server.

    # ── License ──────────────────────────────────────────────────────────
    License:
      type: object
      required:
        - id
        - account_id
        - product_id
        - policy_id
        - customer_id
        - key_prefix
        - token
        - status
        - environment
        - overrides
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        policy_id:
          type: string
          format: uuid
          description: Policy this license cascades from
        customer_id:
          type: string
          format: uuid
          description: End-user customer who owns this license
        key_prefix:
          type: string
          description: First characters of the license key for identification
        token:
          type: string
          description: Signed license token for offline verification
        status:
          type: string
          enum: [inactive, active, suspended, revoked, expired]
        overrides:
          $ref: "#/components/schemas/LicenseOverrides"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Null for perpetual licenses; stamped on first activation if policy uses FROM_FIRST_ACTIVATION basis
        first_activated_at:
          type: string
          format: date-time
          nullable: true
        environment:
          $ref: "#/components/schemas/Environment"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Machine ──────────────────────────────────────────────────────────
    Machine:
      type: object
      required: [id, account_id, license_id, fingerprint, status, lease_issued_at, lease_expires_at, last_checkin_at, environment, created_at]
      properties:
        id: { type: string, format: uuid }
        account_id: { type: string, format: uuid }
        license_id: { type: string, format: uuid }
        fingerprint: { type: string }
        hostname: { type: string, nullable: true }
        metadata: { type: object, nullable: true }
        lease_issued_at: { type: string, format: date-time }
        lease_expires_at: { type: string, format: date-time }
        last_checkin_at: { type: string, format: date-time }
        status:
          type: string
          enum: [active, stale, dead]
          description: |
            active — lease is current, counts against max_machines.
            stale — lease expired but within grace window, still counts.
            dead — grace elapsed, does NOT count. Re-activate to resurrect.
        environment:
          $ref: "#/components/schemas/Environment"
        created_at: { type: string, format: date-time }

    ActivateResult:
      type: object
      description: Returned from POST /v1/licenses/:id/machines (activate) and POST /v1/licenses/:id/machines/:fingerprint/checkin.
      required: [machine, lease_token, lease_claims]
      properties:
        machine:
          $ref: "#/components/schemas/Machine"
        lease_token:
          type: string
          description: Signed gl2 lease token. Verify via the product's Ed25519 public key.
        lease_claims:
          $ref: "#/components/schemas/LeaseClaims"

    LeaseClaims:
      type: object
      description: Decoded payload of the gl2 lease token (server-side convenience copy).
      properties:
        v: { type: integer }
        lid: { type: string, description: License ID }
        pid: { type: string, description: Product ID }
        plid: { type: string, description: Policy ID }
        lst: { type: string, description: License status }
        lex: { type: integer, description: "License expires_at as Unix seconds; 0 = perpetual" }
        mid: { type: string, description: Machine ID }
        fp: { type: string, description: Fingerprint }
        liat: { type: integer, description: Lease issued_at Unix seconds }
        lex2: { type: integer, description: Lease expires_at Unix seconds }
        rqc: { type: boolean, description: Requires checkin (mirrors policy.require_checkout) }
        gs: { type: integer, description: Grace seconds (mirrors policy.checkout_grace_sec) }
        ent: { type: array, items: { type: string }, description: "Effective entitlement codes (sorted, deduped union of policy + license attachments)" }
        iat: { type: integer }
        exp: { type: integer }
        jti: { type: string }

    # ── Entitlement (L3) ────────────────────────────────────────────────
    Entitlement:
      type: object
      required: [id, account_id, code, name, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        account_id: { type: string, format: uuid }
        code:
          type: string
          description: "UPPER_SNAKE format, ^[A-Z][A-Z0-9_]{0,63}$, immutable after creation"
        name: { type: string }
        metadata: { type: object, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateEntitlementRequest:
      type: object
      required: [code, name]
      properties:
        code: { type: string, description: "UPPER_SNAKE, max 64 chars, immutable" }
        name: { type: string }
        metadata: { type: object }

    UpdateEntitlementRequest:
      type: object
      description: "Partial update; code is immutable."
      properties:
        name: { type: string }
        metadata: { type: object }

    EntitlementCodesRequest:
      type: object
      required: [codes]
      properties:
        codes:
          type: array
          items: { type: string }
          description: "Entitlement codes (UPPER_SNAKE). Unknown codes → 422."

    EntitlementSets:
      type: object
      description: "Three-set response for GET /v1/licenses/:id/entitlements"
      properties:
        policy:
          type: array
          items: { type: string }
          description: Codes inherited from the license's policy
        license:
          type: array
          items: { type: string }
          description: Codes directly attached to the license (add-only)
        effective:
          type: array
          items: { type: string }
          description: Sorted union of policy + license

    # ── API Key ──────────────────────────────────────────────────────────
    APIKey:
      type: object
      required: [id, account_id, prefix, scope, environment, created_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        prefix:
          type: string
          description: "Key prefix for identification (e.g. gl_live_)"
        scope:
          type: string
          enum: [account_wide, product]
        label:
          type: string
        environment:
          $ref: "#/components/schemas/Environment"
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    # ── Webhook Endpoint ─────────────────────────────────────────────────
    WebhookEndpoint:
      type: object
      required: [id, account_id, url, events, active, environment, created_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            $ref: "#/components/schemas/EventType"
        active:
          type: boolean
        environment:
          $ref: "#/components/schemas/Environment"
        created_at:
          type: string
          format: date-time

    WebhookEvent:
      type: object
      required: [id, account_id, endpoint_id, event_type, status, attempts, response_body_truncated, created_at, environment]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        endpoint_id:
          type: string
          format: uuid
        event_type:
          $ref: "#/components/schemas/EventType"
        payload:
          type: object
        status:
          $ref: "#/components/schemas/DeliveryStatus"
        attempts:
          type: integer
        last_attempted_at:
          type: string
          format: date-time
          nullable: true
        response_status:
          type: integer
          nullable: true
        domain_event_id:
          type: string
          format: uuid
          nullable: true
        response_body:
          type: string
          nullable: true
        response_body_truncated:
          type: boolean
        response_headers:
          type: object
          nullable: true
        next_retry_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        environment:
          $ref: "#/components/schemas/Environment"

    # ── Enums ────────────────────────────────────────────────────────────
    DeliveryStatus:
      type: string
      enum: [pending, delivered, failed]

    Environment:
      type: string
      enum: [live, test]

    EventType:
      type: string
      enum:
        - license.created
        - license.updated
        - license.activated
        - license.validated
        - license.suspended
        - license.revoked
        - license.reinstated
        - license.expired
        - machine.activated
        - machine.deactivated

    # ── Auth requests/responses ──────────────────────────────────────────
    SignupRequest:
      type: object
      required: [account_name, email, password]
      properties:
        account_name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    SignupResult:
      type: object
      required: [identity, account, membership, api_key, access_token, refresh_token, expires_in]
      properties:
        identity:
          $ref: "#/components/schemas/Identity"
        account:
          $ref: "#/components/schemas/Account"
        membership:
          $ref: "#/components/schemas/MembershipSummary"
        api_key:
          type: string
          description: "Initial live API key, raw value (shown only once)."
        access_token:
          type: string
          description: JWT access token for the new identity.
        refresh_token:
          type: string
          description: Opaque refresh token.
        expires_in:
          type: integer
          description: Access token TTL in seconds.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    # LoginResult is the no-TOTP response from POST /v1/auth/login and the
    # response from /v1/auth/refresh, /v1/auth/switch, and /v1/auth/login/totp.
    # When TOTP is enabled on the identity, /v1/auth/login instead returns
    # {needs_totp: true, pending_token: "..."} — see LoginStep1 in the source.
    LoginResult:
      type: object
      required: [access_token, refresh_token, token_type, expires_in, identity, memberships, current_account]
      properties:
        access_token:
          type: string
          description: JWT access token.
        refresh_token:
          type: string
          description: Opaque refresh token.
        token_type:
          type: string
          examples: ["Bearer"]
        expires_in:
          type: integer
          description: Access token TTL in seconds.
        identity:
          $ref: "#/components/schemas/Identity"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipSummary"
          description: All accounts this identity belongs to.
        current_account:
          $ref: "#/components/schemas/AccountSummary"
        needs_totp:
          type: boolean
          description: True when the identity has TOTP enabled and a second-factor step is required. When true, only pending_token is set.
        pending_token:
          type: string
          description: Short-lived token to submit with a TOTP code via POST /v1/auth/login/totp.

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    MeResult:
      type: object
      required: [identity, current_account, memberships]
      properties:
        identity:
          $ref: "#/components/schemas/Identity"
        current_account:
          $ref: "#/components/schemas/AccountSummary"
        current_role:
          allOf:
            - $ref: "#/components/schemas/Role"
          nullable: true
          description: Role for the current acting account; null if the identity has no membership in the acting account.
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipSummary"

    # ── Product requests ─────────────────────────────────────────────────
    CreateProductRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
        metadata:
          type: object
          description: Arbitrary key-value metadata

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        metadata:
          type: object

    # ── License requests/responses ───────────────────────────────────────
    CreateLicenseRequest:
      type: object
      description: |
        Creates a license. Exactly one of customer_id or customer must be
        provided. If policy_id is omitted, the product's default policy is
        used. Per-license overrides for quantitative fields go in the
        overrides block.
      properties:
        policy_id:
          type: string
          format: uuid
          description: Optional. Falls back to the product's default policy.
        customer_id:
          type: string
          format: uuid
          description: |
            Attach the license to an existing customer. Mutually exclusive
            with `customer`.
        customer:
          $ref: "#/components/schemas/CustomerInlineRequest"
        overrides:
          $ref: "#/components/schemas/LicenseOverrides"
        expires_at:
          type: string
          format: date-time
          description: Caller-provided explicit expiry. Overrides the policy duration calculation.
        entitlements:
          type: array
          items: { type: string }
          description: |
            Optional entitlement codes to attach to the license at creation
            time. Codes must exist in the account's entitlement registry.
            Grant-scoped creation checks AllowedEntitlementCodes.

    UpdateLicenseRequest:
      type: object
      description: |
        Partial update. Omitted fields are unchanged. For expires_at, the
        double-pointer distinguishes "unchanged" (omitted) from "explicitly null"
        (setting to null clears expiry, making the license perpetual).
      properties:
        overrides:
          $ref: "#/components/schemas/LicenseOverrides"
        expires_at:
          type: string
          format: date-time
          nullable: true
        customer_id:
          type: string
          format: uuid
          description: Reassign the license to a different customer in the same account.

    # ── Customer schemas (L4) ────────────────────────────────────────────
    Customer:
      type: object
      required: [id, account_id, email, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        account_id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string, nullable: true }
        metadata: { type: object, nullable: true }
        created_by_account_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Non-null when the customer was created by a grantee account
            under a grant on account_id. NULL for direct-create customers.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CustomerInlineRequest:
      type: object
      required: [email]
      description: |
        Inline customer block used inside CreateLicenseRequest. Upserts
        keyed on (account_id, lower(email)); first-write-wins for
        name and metadata on conflicts.
      properties:
        email: { type: string, format: email }
        name: { type: string }
        metadata: { type: object }

    CreateCustomerRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        metadata: { type: object }

    UpdateCustomerRequest:
      type: object
      description: Partial update; email is immutable post-create.
      properties:
        name: { type: string }
        metadata: { type: object }

    AttachPolicyRequest:
      type: object
      required: [policy_id]
      properties:
        policy_id:
          type: string
          format: uuid
        clear_overrides:
          type: boolean
          default: false
          description: If true, resets license.overrides to an empty object.

    # ── Policy requests/responses ────────────────────────────────────────
    CreatePolicyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        duration_seconds:
          type: integer
          nullable: true
        expiration_strategy:
          type: string
          enum: [MAINTAIN_ACCESS, RESTRICT_ACCESS, REVOKE_ACCESS]
        expiration_basis:
          type: string
          enum: [FROM_CREATION, FROM_FIRST_ACTIVATION]
        max_machines:
          type: integer
          nullable: true
        max_seats:
          type: integer
          nullable: true
        floating:
          type: boolean
        strict:
          type: boolean
        require_checkout:
          type: boolean
        checkout_interval_sec:
          type: integer
        max_checkout_duration_sec:
          type: integer
        checkout_grace_sec:
          type: integer
        component_matching_strategy:
          type: string
          enum: [MATCH_ANY, MATCH_TWO, MATCH_ALL]
        metadata:
          type: object

    UpdatePolicyRequest:
      allOf:
        - $ref: "#/components/schemas/CreatePolicyRequest"
      description: Partial update; omitted fields are unchanged.

    CreateLicenseResult:
      type: object
      required: [license, license_key]
      properties:
        license:
          $ref: "#/components/schemas/License"
        license_key:
          type: string
          description: "Full license key (shown only once)"

    BulkCreateLicenseRequest:
      type: object
      required: [licenses]
      properties:
        licenses:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/CreateLicenseRequest"

    BulkCreateLicenseResult:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/CreateLicenseResult"

    ActivateRequest:
      type: object
      required: [fingerprint]
      properties:
        fingerprint:
          type: string
        hostname:
          type: string
        metadata:
          type: object

    DeactivateRequest:
      type: object
      required: [fingerprint]
      properties:
        fingerprint:
          type: string

    # ── Validate request/response ────────────────────────────────────────
    ValidateRequest:
      type: object
      required: [license_key]
      properties:
        license_key:
          type: string

    ValidateResult:
      type: object
      required: [valid, license, validation_ttl_sec]
      properties:
        valid:
          type: boolean
        license:
          $ref: "#/components/schemas/License"
        entitlements:
          type: array
          items: { type: string }
          description: Effective entitlement codes (sorted union of policy + license attachments)
        validation_ttl_sec:
          type: integer
          minimum: 60
          maximum: 2592000
          description: |
            Effective validation TTL seconds for this license. Mirrors the
            `ttl` claim in the returned token (license.token). Exposed here
            for debugging and for callers that decode the response body
            without verifying the token — authoritative SDK caching should
            verify the token and read the signed `ttl` claim instead.

    # ── API Key requests/responses ───────────────────────────────────────
    CreateAPIKeyRequest:
      type: object
      required: [environment]
      properties:
        label:
          type: string
        environment:
          $ref: "#/components/schemas/Environment"

    CreateAPIKeyResult:
      type: object
      required: [api_key, raw_key]
      properties:
        api_key:
          $ref: "#/components/schemas/APIKey"
        raw_key:
          type: string
          description: "Full API key value (shown only once)"

    # ── Webhook requests ─────────────────────────────────────────────────
    CreateWebhookRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            $ref: "#/components/schemas/EventType"

    # ── List response wrappers (cursor-paginated pages of T) ────────────
    ProductList:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Product"

    LicenseList:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/License"

    APIKeyList:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/APIKey"

    WebhookEndpointList:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/WebhookEndpoint"

    WebhookDeliveryList:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/WebhookEvent"

    # ── TOTP & account switching (F-001 additions) ───────────────────────
    LoginTOTPRequest:
      type: object
      required: [pending_token, code]
      properties:
        pending_token:
          type: string
          description: >
            Short-lived token returned by POST /v1/auth/login when
            the identity has TOTP enabled. Single-use.
        code:
          type: string
          description: >
            6-digit TOTP code OR one of the 16-hex-character single-
            use recovery codes from POST /v1/identity/totp/activate.

    SwitchAccountRequest:
      type: object
      required: [membership_id]
      properties:
        membership_id:
          type: string
          format: uuid
          description: Target membership ID the caller is an active member of.

    TOTPEnrollResponse:
      type: object
      required: [secret, otpauth_url]
      properties:
        secret:
          type: string
          description: Base32-encoded TOTP secret. Show once.
        otpauth_url:
          type: string
          description: otpauth:// URL for QR code rendering.

    TOTPCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: 6-digit TOTP or 16-hex recovery code.

    TOTPActivateResponse:
      type: object
      required: [recovery_codes]
      properties:
        recovery_codes:
          type: array
          items:
            type: string
          description: >
            10 single-use 16-hex recovery codes. Shown once at
            activation — store carefully. Each can be used in place
            of a TOTP code on POST /v1/auth/login/totp or
            /v1/identity/totp/disable.

    # ── Environment resource (F-001 additions) ───────────────────────────
    # Note: the "Environment" schema above is the slug enum (live/test).
    # This is the environment-resource schema returned by /v1/environments.
    EnvironmentResource:
      type: object
      required: [id, account_id, slug, name, position, created_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        color:
          type: string
        position:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EnvironmentList:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentResource"
        has_more:
          type: boolean
          description: Always false — environments are capped at 5.

    CreateEnvironmentRequest:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
          description: 1-32 lowercase letters/digits/hyphens, must start with a letter.
        name:
          type: string
          maxLength: 32
        description:
          type: string
          maxLength: 100
        icon:
          type: string
        color:
          type: string

    # ── Invitations (F-001 additions) ────────────────────────────────────
    InvitationKind:
      type: string
      enum: [membership, grant]

    InvitationLookup:
      type: object
      required: [kind, email, account_name, expires_at]
      properties:
        kind:
          $ref: "#/components/schemas/InvitationKind"
        email:
          type: string
          format: email
        account_name:
          type: string
        role_name:
          type: string
          description: Present for kind=membership only.
        expires_at:
          type: string
          format: date-time

    Invitation:
      type: object
      required: [id, kind, email, created_by_identity_id, created_by_account_id, expires_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/InvitationKind"
        email:
          type: string
          format: email
        account_id:
          type: string
          format: uuid
          description: Present for kind=membership — target account.
        role_id:
          type: string
          format: uuid
          description: Present for kind=membership — role the acceptor receives.
        grant_draft:
          type: object
          description: Present for kind=grant — IssueRequest-shaped blob without grantee_account_id.
        created_by_identity_id:
          type: string
          format: uuid
        created_by_account_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateMembershipInvitationRequest:
      type: object
      required: [email, role_slug]
      properties:
        email:
          type: string
          format: email
        role_slug:
          type: string
          description: One of owner, admin, developer, operator.

    CreateGrantInvitationRequest:
      type: object
      required: [email, grant_draft]
      properties:
        email:
          type: string
          format: email
        grant_draft:
          $ref: "#/components/schemas/IssueGrantRequest"

    # POST /v1/accounts/:id/invitations accepts either shape — the
    # server switches on presence of grant_draft vs role_slug.
    CreateInvitationRequest:
      oneOf:
        - $ref: "#/components/schemas/CreateMembershipInvitationRequest"
        - $ref: "#/components/schemas/CreateGrantInvitationRequest"

    CreateInvitationResult:
      type: object
      required: [invitation, accept_url]
      properties:
        invitation:
          $ref: "#/components/schemas/Invitation"
        accept_url:
          type: string
          format: uri
          description: >
            Full URL including the raw token. Deliver this to the
            recipient out-of-band (email, Slack, etc.). Anyone who
            obtains it and authenticates as the invitation email can
            accept.

    InvitationAcceptResult:
      type: object
      properties:
        membership_id:
          type: string
          format: uuid
          description: Present for kind=membership.
        account_id:
          type: string
          format: uuid
        grant_id:
          type: string
          format: uuid
          description: Present for kind=grant.

    # ── Grants (F-001 additions) ─────────────────────────────────────────
    GrantCapability:
      type: string
      enum:
        - LICENSE_CREATE
        - LICENSE_READ
        - LICENSE_UPDATE
        - LICENSE_SUSPEND
        - LICENSE_REVOKE
        - MACHINE_READ
        - MACHINE_DEACTIVATE

    GrantStatus:
      type: string
      enum: [pending, active, suspended, revoked]

    GrantConstraints:
      type: object
      description: Typed constraint blob enforced at license-create time.
      properties:
        max_licenses_total:
          type: integer
          description: Upper bound on licenses attributed to this grant across its lifetime.
        max_licenses_per_month:
          type: integer
          description: Upper bound on licenses attributed to this grant in the last 30 days.
        allowed_policy_ids:
          type: array
          items: { type: string }
        allowed_entitlement_codes:
          type: array
          items: { type: string }
        customer_email_pattern:
          type: string
          description: >
            Go RE2 regular expression matched against the resolved customer
            email. The server wraps the pattern as `(?i)^(?:<pattern>)$`
            so matching is case-insensitive and full-match — an unanchored
            pattern like `@acme\.com` cannot be bypassed by suffixes.
            Example: `.+@example\.com` restricts grant-scoped license creation
            to @example.com addresses.

    Grant:
      type: object
      required: [id, grantor_account_id, grantee_account_id, product_id, status, capabilities, created_at]
      properties:
        id:
          type: string
          format: uuid
        grantor_account_id:
          type: string
          format: uuid
        grantee_account_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/GrantStatus"
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/GrantCapability"
        constraints:
          $ref: "#/components/schemas/GrantConstraints"
        invitation_id:
          type: string
          format: uuid
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        accepted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IssueGrantRequest:
      type: object
      required: [grantee_account_id, product_id, capabilities]
      properties:
        grantee_account_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        capabilities:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/GrantCapability"
        constraints:
          $ref: "#/components/schemas/GrantConstraints"
        expires_at:
          type: string
          format: date-time
          nullable: true

    DomainEvent:
      type: object
      required: [id, account_id, event_type, resource_type, actor_kind, created_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        environment:
          type: string
        event_type:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
          nullable: true
        acting_account_id:
          type: string
          format: uuid
          nullable: true
        identity_id:
          type: string
          format: uuid
          nullable: true
        actor_label:
          type: string
        actor_kind:
          type: string
          enum: [identity, api_key, system, public]
        api_key_id:
          type: string
          format: uuid
          nullable: true
        grant_id:
          type: string
          format: uuid
          nullable: true
        request_id:
          type: string
          nullable: true
        ip_address:
          type: string
          nullable: true
        payload:
          type: object
        created_at:
          type: string
          format: date-time

    Snapshot:
      type: object
      properties:
        licenses:
          $ref: "#/components/schemas/LicenseStats"
        machines:
          $ref: "#/components/schemas/MachineStats"
        customers:
          $ref: "#/components/schemas/CustomerStats"
        grants:
          $ref: "#/components/schemas/GrantStats"
        events_by_day:
          type: array
          items:
            $ref: "#/components/schemas/DailyBucket"

    LicenseStats:
      type: object
      properties:
        active:
          type: integer
        suspended:
          type: integer
        revoked:
          type: integer
        expired:
          type: integer
        inactive:
          type: integer
        total:
          type: integer

    MachineStats:
      type: object
      properties:
        active:
          type: integer
        stale:
          type: integer
        dead:
          type: integer
        total:
          type: integer

    CustomerStats:
      type: object
      properties:
        total:
          type: integer

    GrantStats:
      type: object
      properties:
        active_grants:
          type: integer
        licenses_via_grants:
          type: integer

    DailyBucket:
      type: object
      properties:
        date:
          type: string
          format: date
          description: "YYYY-MM-DD"
        count:
          type: integer

    SearchResult:
      type: object
      description: >
        Aggregated search results grouped by resource type. Each field is
        omitted when it contains no results.
      properties:
        licenses:
          type: array
          items:
            $ref: "#/components/schemas/License"
        machines:
          type: array
          items:
            $ref: "#/components/schemas/Machine"
        customers:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
